<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Arizona Gourmet</title>
    <!-- LIBRERÍA TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ocultar pantallas */
        .oculto { display: none !important; }
        body { background-color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="text-gray-800">

    <!-- BARRA DE NAVEGACIÓN -->
    <header id="navbar" class="oculto bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <!-- AQUÍ ESTÁ TU LOGO -->
            <div class="flex items-center gap-4">
                <img src="https://i.postimg.cc/52JdgKD4/Ariz_LOGO.png" alt="Logo" class="w-[80px] h-[80px] bg-white p-1 rounded-2xl shadow-lg object-contain flex-shrink-0">
                <h1 class="text-2xl font-bold text-gray-700 hidden sm:block">Pedidos Web</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <span id="user-info" class="text-sm font-medium text-gray-500"></span>
                <button onclick="mostrarPantalla('carrito')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow font-semibold transition-colors">
                    🛒 <span id="cart-count" class="bg-white text-blue-600 px-2 rounded-full text-xs ml-1">0</span>
                </button>
                <button onclick="cerrarSesion()" class="text-gray-500 hover:text-red-500 text-sm font-bold transition-colors">Salir</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        
        <!-- PANTALLA: LOGIN -->
        <section id="pantalla-login" class="pantalla flex justify-center items-center mt-10">
            <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
                <img src="https://i.postimg.cc/52JdgKD4/Ariz_LOGO.png" alt="Logo" class="w-[120px] h-[120px] mx-auto bg-white p-1 rounded-2xl shadow-lg mb-6 object-contain flex-shrink-0">
                <h2 class="text-2xl font-bold mb-6 text-gray-700">Iniciar Sesión</h2>
                
                <input type="email" id="login-email" placeholder="Correo electrónico" class="w-full p-3 mb-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="login-pass" placeholder="Contraseña" class="w-full p-3 mb-6 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                
                <button onclick="hacerLogin()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded-lg shadow-md transition-colors">Ingresar</button>
                
                <p class="mt-6 text-sm text-gray-600">¿No tienes cuenta? <a href="#" onclick="mostrarPantalla('registro')" class="text-blue-600 font-bold hover:underline">Regístrate</a></p>
                <p id="login-error" class="text-red-500 text-sm mt-4 font-semibold"></p>
            </div>
        </section>

        <!-- PANTALLA: REGISTRO (Oculta) -->
        <section id="pantalla-registro" class="pantalla oculto flex justify-center items-center mt-10">
            <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
                <h2 class="text-2xl font-bold mb-6 text-gray-700 text-center">Nuevo Usuario</h2>
                <input type="text" id="reg-nombre" placeholder="Nombre completo" class="w-full p-3 mb-4 border rounded-lg">
                <input type="email" id="reg-email" placeholder="Correo electrónico" class="w-full p-3 mb-4 border rounded-lg">
                <input type="password" id="reg-pass" placeholder="Contraseña" class="w-full p-3 mb-4 border rounded-lg">
                <select id="reg-empresa" onchange="cargarAlmacenes()" class="w-full p-3 mb-4 border rounded-lg"><option>Seleccione Empresa...</option></select>
                <select id="reg-almacen" class="w-full p-3 mb-6 border rounded-lg"><option>Seleccione Almacén...</option></select>
                
                <button onclick="hacerRegistro()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-blue-700">Registrarse</button>
                <p class="mt-4 text-center text-sm">¿Ya tienes cuenta? <a href="#" onclick="mostrarPantalla('login')" class="text-blue-600 font-bold">Inicia sesión</a></p>
                <p id="reg-msg" class="text-center mt-2 text-sm"></p>
            </div>
        </section>

        <!-- PANTALLA: CATÁLOGO -->
        <section id="pantalla-catalogo" class="pantalla oculto">
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-3xl font-bold text-gray-800">Catálogo de Productos</h2>
            </div>
            
            <!-- Grid de Tailwind: 1 columna en movil, 2 en tablet, 4 en PC -->
            <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Los productos se inyectan aquí con JS -->
            </div>
        </section>

        <!-- PANTALLA: CARRITO -->
        <section id="pantalla-carrito" class="pantalla oculto max-w-3xl mx-auto">
            <button class="mb-4 text-gray-500 hover:text-gray-800 font-bold" onclick="mostrarPantalla('catalogo')">← Volver al Catálogo</button>
            <div class="bg-white rounded-2xl shadow-xl p-6">
                <h2 class="text-2xl font-bold mb-4 border-b pb-2">Tu Carrito de Pedidos</h2>
                <div id="lista-carrito" class="mb-6 space-y-4">
                    <!-- Items del carrito -->
                </div>
                <button class="w-full bg-green-600 hover:bg-green-700 text-white text-lg font-bold py-4 rounded-xl shadow-lg transition-colors" onclick="procesarPedido()">Confirmar Pedido</button>
                <p id="checkout-msg" class="text-center mt-4 font-bold"></p>
            </div>
        </section>

    </main>

    <script src="js/mock-db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
